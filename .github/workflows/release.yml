name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version for manual release dry runs"
        required: false
        default: "0.1.0-dev"
      create_release:
        description: "Create a GitHub Release for manual runs"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  windows-packages:
    name: Windows packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bootstrap repo-local toolchain
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\dev\setup.ps1

      - name: Test runtime core
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\dev\test-fast.ps1

      - name: Resolve package version
        id: version
        shell: powershell
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $Version = "${{ github.ref_name }}".TrimStart("v")
          } elseif ("${{ inputs.version }}" -ne "") {
            $Version = "${{ inputs.version }}"
          } else {
            $Version = "0.1.0-dev"
          }
          "version=$Version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Run upgrade rehearsal
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\test-upgrade-rehearsal.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Package portable Studio
        id: portable
        shell: powershell
        run: |
          $Output = powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\package-portable.ps1 -Version "${{ steps.version.outputs.version }}"
          $ZipPath = ($Output | Select-Object -Last 1)
          if (-not (Test-Path -LiteralPath $ZipPath)) {
            throw "package not found: $ZipPath"
          }
          "zip_path=$ZipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Test portable Studio package
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\test-portable-package.ps1 -PackagePath "${{ steps.portable.outputs.zip_path }}"

      - name: Package installer bundle
        id: installer
        shell: powershell
        run: |
          $Output = powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\package-installer.ps1 -Version "${{ steps.version.outputs.version }}" -PortableZip "${{ steps.portable.outputs.zip_path }}"
          $ZipPath = ($Output | Select-Object -Last 1)
          if (-not (Test-Path -LiteralPath $ZipPath)) {
            throw "package not found: $ZipPath"
          }
          "zip_path=$ZipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Test installer bundle
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\test-installer-package.ps1 -PackagePath "${{ steps.installer.outputs.zip_path }}" -PortableZip "${{ steps.portable.outputs.zip_path }}"

      - name: Package runtime
        id: runtime
        shell: powershell
        run: |
          $Output = powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\package-runtime.ps1 -Version "${{ steps.version.outputs.version }}"
          $ZipPath = ($Output | Select-Object -Last 1)
          if (-not (Test-Path -LiteralPath $ZipPath)) {
            throw "package not found: $ZipPath"
          }
          "zip_path=$ZipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Test runtime package
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\test-runtime-package.ps1 -PackagePath "${{ steps.runtime.outputs.zip_path }}"

      - name: Package experimental macOS support
        id: macos
        shell: powershell
        run: |
          $Output = powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\package-macos.ps1 -Version "${{ steps.version.outputs.version }}"
          $ZipPath = ($Output | Select-Object -Last 1)
          if (-not (Test-Path -LiteralPath $ZipPath)) {
            throw "package not found: $ZipPath"
          }
          "zip_path=$ZipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Test experimental macOS support package
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\test-macos-package.ps1 -PackagePath "${{ steps.macos.outputs.zip_path }}"

      - name: Write release checksums
        id: checksums
        shell: powershell
        run: |
          $ChecksumPath = Join-Path (Resolve-Path .\dist).Path 'SHA256SUMS.txt'
          $Artifacts = @(
            "${{ steps.portable.outputs.zip_path }}",
            "${{ steps.installer.outputs.zip_path }}",
            "${{ steps.runtime.outputs.zip_path }}",
            "${{ steps.macos.outputs.zip_path }}"
          )
          $Lines = foreach ($Artifact in $Artifacts) {
            $Item = Get-Item -LiteralPath $Artifact
            $Hash = (Get-FileHash -LiteralPath $Item.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$Hash  $($Item.Name)"
          }
          $Lines | Set-Content -LiteralPath $ChecksumPath -Encoding ASCII
          "path=$ChecksumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload portable Studio artifact
        uses: actions/upload-artifact@v4
        with:
          name: hvac-studio-${{ steps.version.outputs.version }}-windows-amd64-portable
          path: ${{ steps.portable.outputs.zip_path }}
          if-no-files-found: error

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: hvac-studio-runtime-${{ steps.version.outputs.version }}-windows-amd64
          path: ${{ steps.runtime.outputs.zip_path }}
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: hvac-studio-${{ steps.version.outputs.version }}-windows-amd64-installer
          path: ${{ steps.installer.outputs.zip_path }}
          if-no-files-found: error

      - name: Upload experimental macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: hvac-studio-${{ steps.version.outputs.version }}-macos-universal-experimental
          path: ${{ steps.macos.outputs.zip_path }}
          if-no-files-found: error

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: hvac-studio-${{ steps.version.outputs.version }}-SHA256SUMS
          path: ${{ steps.checksums.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $Tag = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "v${{ steps.version.outputs.version }}" }
          $GhArgs = @(
            "release", "create", $Tag,
            "${{ steps.portable.outputs.zip_path }}",
            "${{ steps.installer.outputs.zip_path }}",
            "${{ steps.runtime.outputs.zip_path }}",
            "${{ steps.macos.outputs.zip_path }}",
            "${{ steps.checksums.outputs.path }}",
            "--title", $Tag,
            "--generate-notes"
          )
          if ($Tag -match '-(alpha|beta|rc|dev)([.-]|$)' -or "${{ github.ref_type }}" -ne "tag") {
            $GhArgs += "--prerelease"
          }
          gh @GhArgs
